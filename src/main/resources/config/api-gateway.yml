server:
  port: 8098


eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8096/eureka/

spring:
  cloud:
    gateway:
      routes:
        - id: libro
          uri: lb://libro
          predicates:
            - Path=/api/bibliotecaam/libro/**
        - id: microserviciodonacion
          uri: lb://microserviciodonacion
          predicates:
            - Path=/api/bibliotecaam/donacion/**
        - id: msresenia
          uri: lb//msresenia
          predicates:
            - Path=/api/bibliotecaam/resenia/**
        - id: asistencia
          uri: lb://asistencia
          predicates:
            - Path=/api/bibliotecaam/asistencia/**
        - id: taller
          uri: lb://taller
          predicates:
            - Path=/api/bibliotecaam/taller/**
        - id: usuario
          uri: lb://usuario
          predicates:
            - Path=/api/bibliotecaam/usuario/**
        - id: compra
          uri: lb://compra
          predicates:
            - Path=/api/bibliotecaam/compra/**
        - id: prestamo
          uri: lb://prestamo
          predicates:
            - Path=//api/bibliotecaam/prestamo/**
        - id: empleado
          uri: lb://empleado
          predicates:
            - Path=/api/bibliotecaam/empleado/**